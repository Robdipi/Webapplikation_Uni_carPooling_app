<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>impressum</title>
  </head>
  <body>
    <header>
      <link rel="stylesheet" href="../style.css" />
      <link rel="stylesheet" href="profile.css" />
      <div class="logo">
        <a href="../home/home.html" class="open-btn"> CampusRide</a>
      </div>
      <nav>
        <a href="profile.html" class="open-btn">Änderungen speichern</a>
      </nav>
    </header>

    <main>
      <div class="content-wrapper">
        <section>
          <h2>Profil anzeigen</h2>

          <div class="form-group">
            <label>Vorname</label>
            <div class="profile-field">Max</div>
          </div>

          <div class="form-group">
            <label>Nachname</label>
            <div class="profile-field">Mustermann</div>
          </div>

          <div class="form-group">
            <label>Geburtsdatum</label>
            <div class="profile-field">01.01.2000</div>
          </div>

          <div class="form-group">
            <label>Wohnort</label>
            <div class="profile-field">Konstanz</div>
          </div>

          <div class="form-group">
            <label>Preis pro km</label>
            <div class="profile-field">0,60 €</div>
          </div>

          <div class="form-group">
            <label>Studiengang</label>
            <div class="profile-field">Allgemeine Informatik (AIN)</div>
          </div>
        </section>
      </div>

      <div class="edit-button-wrapper">
        <button class="create-ride-submit-button">Profil bearbeiten</button>
      </div>
    </main>
    <footer>
      <a href="../impressum/impressum.html" class="extra-info-btn">Impressum</a>
      | <a href="#" class="extra-info-btn">Copyright</a> |
      <a href="#" class="extra-info-btn">Kontakt</a>
    </footer>
  </body>
</html>
