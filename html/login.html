<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Anmelden</title>
  </head>
  <body>
    <header>
      <div class="logo">CampusRide</div>
      <nav>
        <a href="index.html">Zurück zur Startseite</a>
      </nav>
    </header>

    <main>
      <article>
        <section>
          <h1>Bitte Benutzerdaten eingeben</h1>
          <p>Melde dich an, um Fahrten am Campus zu finden oder anzubieten.</p>

          <form action="home.html">
            <div class="form-group">
              <label for="user-id">Benutzername oder E-Mail:</label>
              <input
                type="text"
                id="user-id"
                name="username"
                placeholder="z.B. Alex_Muster"
                required
              />
            </div>

            <div class="form-group">
              <label for="pass-id">Passwort:</label>
              <input type="password" id="pass-id" name="password" required />
            </div>

            <button type="submit">Anmelden</button>
          </form>
        </section>
      </article>
    </main>
  </body>
</html>
